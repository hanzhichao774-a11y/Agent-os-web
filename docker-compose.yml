services:
  pgvector:
    image: agnohq/pgvector:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
    ports:
      - "5532:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: agent-os-web-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PGVECTOR_DB_URL: postgresql+psycopg://ai:ai@pgvector:5432/ai
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-knowledge:/app/knowledge/docs
      - backend-workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 12

  frontend:
    image: agent-os-web-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 6

volumes:
  pgvector-data:
  backend-data:
  backend-knowledge:
  backend-workspace:
